                                <h3><span class="" >Todo Management</span></h3>
                            </div>
                        
                            <form action="" id="todoForm">
                            <div class="card-body">
                                <div class="form-group">
                                    <label for="title">Title<span class="text-danger">*</span></label>
                                    <input class="form-control" required type="text" id="title">
                                </div>

                                <div class="form-group">
                                <label for="completed">Status<span class="text-danger">*</span></label>
                                   <select class="form-control" required type="text" id="completed">
                                          <option value="Yes">Yes</option>
                                          <option value="No">No</option>
                                   </select>
                                </div>
                                </div>

                                        <option value="6">6</option>   
                                    </select> 
                                </div> -->

                                    <button class="btn btn-block btn-outline-light" id="addTodo">Add Todo</button>
                                    <button class="btn btn-block btn-outline-light d-none" type="button" id="updateTodo">Update Todo</button>
                                </div>
                            </form>
